const CATEGORY_ICONS={"On-Page SEO":"🏷️","Internal Linking":"🔗","Technical SEO":"⚙️","Content":"✍️","Local SEO":"📍","CRO / UX":"🎯"};
const arrow=`<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg>`;
const extLink=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3H3v10h10v-3M9 2h5v5M14 2L7 9"/></svg>`;

let activeTab="summary",selectedHotel="All Properties";

function badgeHTML(s){if(!s)return'';const l=s.toLowerCase();let c='badge-green';if(l.includes('progress'))c='badge-amber';else if(l.includes('analysis'))c='badge-blue';return`<span class="badge ${c}">${s}</span>`}
function linkPill(u,l,cls){return`<a class="link-pill ${cls||''}" href="${u}" target="_blank" rel="noopener">${extLink} ${l}</a>`}
function filter(a){return selectedHotel==="All Properties"?a:a.filter(t=>t.hotel===selectedHotel||t.hotel==="All Properties")}

function renderFilters(){document.getElementById('hotelFilters').innerHTML=HOTELS.map(h=>`<button class="hotel-btn ${h===selectedHotel?'active':''}" onclick="selectHotel('${h}')">${h}</button>`).join('')}

function renderSummary(){
  const data=selectedHotel==="All Properties"?SUMMARY:SUMMARY.filter(s=>s.hotel===selectedHotel);
  const sc=filter(SEO_TASKS).length,dc=filter(DEV_TASKS).length,gc=filter(DESIGN_TASKS).length;
  const comp=filter(SEO_TASKS).filter(t=>t.status==="Implemented").length+filter(DEV_TASKS).filter(t=>t.status==="Done").length+filter(DESIGN_TASKS).filter(t=>t.status==="Done").length;
  const total=sc+dc+gc;const pct=total>0?Math.round(comp/total*100):0;
  let h=`<div class="stat-row fade-up">
    <div class="stat-card"><div class="stat-card-val purple">${sc}</div><div class="stat-card-label">SEO Tasks</div></div>
    <div class="stat-card"><div class="stat-card-val blue">${dc}</div><div class="stat-card-label">Dev Tasks</div></div>
    <div class="stat-card"><div class="stat-card-val teal">${gc}</div><div class="stat-card-label">Design & Dev</div></div>
    <div class="stat-card"><div class="stat-card-val green">${pct}%</div><div class="stat-card-label">Completion</div></div>
    <div class="stat-card"><div class="stat-card-val amber">${data.length}</div><div class="stat-card-label">Hotels</div></div>
  </div>`;
  data.forEach((s,i)=>{const c=HOTEL_COLORS[s.hotel]||"#2e5bff";
    const meta=[s.seo&&`${s.seo} SEO`,s.dev&&`${s.dev} Dev`,s.design&&`${s.design} Design`].filter(Boolean).join(' · ');
    h+=`<div class="summary-card fade-up delay-${Math.min(i+1,4)}"><div class="summary-header"><div class="summary-hotel-info"><div class="hotel-avatar" style="background:linear-gradient(135deg,${c},${c}aa)">${s.hotel.charAt(0)}</div><div><div class="summary-hotel-name">${s.hotel}</div><div class="summary-hotel-meta">${meta} tasks this week</div></div></div><div class="badge-complete">✓ Completed</div></div><p class="summary-text">${s.summary}</p><div class="wins-box"><div class="wins-label">🏆 Expected Key Wins</div><div class="wins-tags">${s.wins.map(w=>`<span class="win-tag">${w}</span>`).join('')}</div></div></div>`;
  });
  document.getElementById('section-summary').innerHTML=h;
  document.getElementById('heroTotal').textContent=total;
  document.getElementById('heroCompleted').textContent=comp;
}

function renderSEO(){
  const tasks=filter(SEO_TASKS);let h='';
  tasks.forEach(t=>{const icon=CATEGORY_ICONS[t.category]||'📋';
    h+=`<div class="task-card" id="seo-${t.id}"><div class="task-head" onclick="toggleTask('seo',${t.id})"><div class="task-head-left"><div class="task-icon">${icon}</div><div><div class="task-title">${t.title}</div><div class="task-meta">${t.hotel} · ${t.source} · ${t.category}</div></div></div><div class="task-head-right">${badgeHTML(t.status)}<span class="chevron">▾</span></div></div><div class="task-body"><div class="task-body-inner">${t.subProperties?`<div class="task-properties"><strong>Properties: </strong>${t.subProperties.join(' · ')}</div>`:''}<div class="task-columns"><div><div class="task-col-label">What Was Found</div><div class="task-col-text">${t.description}</div></div><div><div class="task-col-label">Action Taken</div><div class="task-col-text">${t.action}</div></div></div><div class="task-links-label">Task Sheets & References</div><div class="task-links">${t.links.map(l=>linkPill(l.url,l.label)).join('')}</div></div></div></div>`;
  });
  document.getElementById('section-seo').innerHTML=h||'<p style="color:var(--ink-muted);text-align:center;padding:40px 0">No SEO tasks for this property this week.</p>';
}

function renderDev(){
  const tasks=filter(DEV_TASKS);let h='';
  tasks.forEach(t=>{
    h+=`<div class="task-card dev-card" id="dev-${t.id}"><div class="task-head" onclick="toggleTask('dev',${t.id})"><div class="task-head-left"><div class="dev-num">${t.id}</div><div><div class="task-title">${t.title}</div><div class="task-meta">${t.hotel} · via ${t.source}</div></div></div><div class="task-head-right">${badgeHTML(t.status)}<span class="chevron">▾</span></div></div><div class="task-body"><div class="task-body-inner"><p class="task-col-text" style="margin-bottom:14px">${t.description}</p>${t.link?`<div class="task-links">${linkPill(t.link,'View Live / Task Link')}</div>`:''}</div></div></div>`;
  });
  document.getElementById('section-dev').innerHTML=h||'<p style="color:var(--ink-muted);text-align:center;padding:40px 0">No dev tasks for this property this week.</p>';
}

function renderDesign(){
  const tasks=filter(DESIGN_TASKS);let h='';
  if(tasks.length){
    const liveCount=tasks.reduce((a,t)=>a+t.pages.filter(p=>p.env==='live').length,0);
    const stagingCount=tasks.reduce((a,t)=>a+t.pages.filter(p=>p.env==='staging').length,0);
    h+=`<div class="stat-row fade-up" style="margin-bottom:24px"><div class="stat-card"><div class="stat-card-val green">${liveCount}</div><div class="stat-card-label">Pages Live</div></div><div class="stat-card"><div class="stat-card-val amber">${stagingCount}</div><div class="stat-card-label">Pages Staged</div></div><div class="stat-card"><div class="stat-card-val purple">${tasks.length}</div><div class="stat-card-label">Design Tasks</div></div></div>`;
  }
  tasks.forEach(t=>{
    const isStaging=t.type==='staging';
    h+=`<div class="task-card design-card" id="design-${t.id}"><div class="task-head" onclick="toggleTask('design',${t.id})"><div class="task-head-left"><div class="design-num">${isStaging?'🔧':'🚀'}</div><div><div class="task-title">${t.title}</div><div class="task-meta">${t.hotel} · via ${t.source} · ${isStaging?'Staging':'Production'}</div></div></div><div class="task-head-right">${badgeHTML(t.status)}<span class="chevron">▾</span></div></div><div class="task-body"><div class="task-body-inner"><p class="task-col-text" style="margin-bottom:16px">${t.description}</p><div class="task-links-label">Pages ${isStaging?'Pushed to Staging':'Shipped to Production'}</div><div class="live-pages-grid">${t.pages.map(p=>`<div class="live-page-item"><span class="live-dot ${p.env}"></span><a href="${p.url}" target="_blank">${p.label}</a><span class="page-type-badge ${p.env}">${p.env}</span></div>`).join('')}</div></div></div></div>`;
  });
  document.getElementById('section-design').innerHTML=h||'<p style="color:var(--ink-muted);text-align:center;padding:40px 0">No design & dev tasks for this property this week.</p>';
}

function switchTab(tab){activeTab=tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===`section-${tab}`));}
function selectHotel(h){selectedHotel=h;renderFilters();renderSummary();renderSEO();renderDev();renderDesign();}
function toggleTask(prefix,id){const el=document.getElementById(`${prefix}-${id}`);const was=el.classList.contains('open');document.querySelectorAll(`#section-${prefix} .task-card`).forEach(c=>c.classList.remove('open'));if(!was)el.classList.add('open');}

renderFilters();renderSummary();renderSEO();renderDev();renderDesign();
</script>
